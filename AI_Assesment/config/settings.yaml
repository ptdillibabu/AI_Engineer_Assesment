# Deliberation Engine Configuration

llm:
  provider: "azure_openai"  # openai or anthropic or "gemini" or "azure_openai"
  model: "gpt-4o"  # or claude-3-haiku-20240307 or "gemini-2.0-flash" or "gpt-4"
  temperature: 0.7
  max_tokens: 2000


# Deliberation Settings
deliberation:
  min_rounds: 2
  max_rounds: 6 # Arrived through experimentation
  use_summarizer: true

# System Context 
system_context: |
  A Government CRM system used in Operations and Country Engagement. 
  The system is the central record of relationships between the organization 
  and its government counterparts: country representatives, ministry contacts, 
  project leads, and mission delegates. It tracks contact details, engagement 
  history, project affiliations, and active missions across ~100 member countries. 
  Users include regional coordinators, project managers, and executive-level staff. 
  Data is sensitive — some contact records carry diplomatic or confidentiality considerations.

# Feature Request (can be send it via CLI as well)
feature_request: |
  We need a better way to track who is the right person to contact in each country.

# Output Settings
output:
  format: "markdown"  # markdown or json
  save_trace: true
  trace_dir: "output"